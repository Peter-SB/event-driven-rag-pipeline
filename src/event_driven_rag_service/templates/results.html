<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Results — {{ query }}</title>
  <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
    }

    header {
      background: #1a1a2e;
      color: #fff;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    header h1 { font-size: 1.25rem; font-weight: 600; letter-spacing: -0.02em; }
    header .subtitle { font-size: 0.8rem; opacity: 0.5; margin-left: auto; }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      color: #fff;
      text-decoration: none;
      font-size: 0.85rem;
      opacity: 0.8;
      transition: opacity 0.15s;
    }
    .back-link:hover { opacity: 1; }

    main { max-width: 900px; margin: 2rem auto; padding: 0 1.5rem; }

    /* --- Job summary --- */
    .job-summary {
      background: #fff;
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      margin-bottom: 1.75rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .job-query {
      font-size: 1.15rem;
      font-weight: 700;
      flex: 1;
      min-width: 200px;
    }
    .job-meta {
      display: flex;
      gap: 1rem;
      align-items: center;
      flex-wrap: wrap;
    }
    .meta-item {
      display: flex;
      flex-direction: column;
      gap: 0.1rem;
      font-size: 0.8rem;
    }
    .meta-label { color: #aaa; font-weight: 600; text-transform: uppercase; font-size: 0.68rem; letter-spacing: 0.05em; }
    .meta-value { color: #333; font-weight: 500; }

    /* --- Status badges --- */
    .badge {
      display: inline-block;
      padding: 0.25rem 0.7rem;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .badge-embedding  { background: #dbeafe; color: #1d4ed8; }
    .badge-searching  { background: #fef9c3; color: #a16207; }
    .badge-complete   { background: #dcfce7; color: #166534; }
    .badge-failed     { background: #fee2e2; color: #991b1b; }

    /* --- Results header --- */
    .results-header {
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }
    .results-header h2 { font-size: 1rem; font-weight: 600; color: #444; }
    .results-header .count { font-size: 0.85rem; color: #aaa; }

    /* --- Result cards --- */
    .results-list { display: flex; flex-direction: column; gap: 1rem; }

    .result-card {
      background: #fff;
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      border-left: 4px solid #6366f1;
    }

    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 0.75rem;
    }

    .card-title {
      font-size: 1rem;
      font-weight: 700;
      color: #1a1a2e;
      line-height: 1.4;
    }

    .card-meta {
      display: flex;
      gap: 0.6rem;
      align-items: center;
      flex-shrink: 0;
    }

    .score-badge {
      background: #f3f4f6;
      color: #374151;
      padding: 0.2rem 0.55rem;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }
    .post-id {
      font-size: 0.75rem;
      color: #bbb;
    }

    .card-text {
      font-size: 0.875rem;
      line-height: 1.65;
      color: #444;
    }
    .text-preview { display: block; }
    .text-full { display: none; }

    .load-more-btn {
      display: inline-block;
      margin-top: 0.5rem;
      padding: 0.25rem 0;
      background: none;
      border: none;
      color: #6366f1;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 2px;
    }
    .load-more-btn:hover { color: #4f46e5; }

    /* --- Empty / error / loading states --- */
    .state-card {
      background: #fff;
      border-radius: 12px;
      padding: 3rem 2rem;
      text-align: center;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .state-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
    .state-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.4rem; }
    .state-subtitle { color: #888; font-size: 0.875rem; }

    .spinner {
      display: inline-block;
      width: 36px;
      height: 36px;
      border: 3px solid #e0e0e0;
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 0.75rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-detail {
      margin-top: 0.75rem;
      padding: 0.65rem 1rem;
      background: #fef2f2;
      border-radius: 8px;
      font-size: 0.8rem;
      color: #991b1b;
      font-family: monospace;
    }

    /* polling overlay for in-progress results page */
    #status-poller {
      display: none;
    }
  </style>
</head>
<body>

<header>
  <a href="/ui/search" class="back-link">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="15 18 9 12 15 6"/>
    </svg>
    Back
  </a>
  <h1>Search Results</h1>
  <span class="subtitle">Job {{ job_id[:8] }}…</span>
</header>

<main>
  <!-- Job summary bar -->
  <div class="job-summary">
    <div class="job-query">"{{ query }}"</div>
    <div class="job-meta">
      <div class="meta-item">
        <span class="meta-label">Status</span>
        <span class="meta-value"><span class="badge badge-{{ status }}">{{ status }}</span></span>
      </div>
      <div class="meta-item">
        <span class="meta-label">Library</span>
        <span class="meta-value">{{ library_id }}</span>
      </div>
      <div class="meta-item">
        <span class="meta-label">K</span>
        <span class="meta-value">{{ k }}</span>
      </div>
      {% if created_at %}
      <div class="meta-item">
        <span class="meta-label">Submitted</span>
        <span class="meta-value">{{ created_at }}</span>
      </div>
      {% endif %}
    </div>
  </div>

  <!-- Results content (shared partial, also used by /poll for htmx swap) -->
  {% include 'partials/results_content.html' %}
</main>

<script>
function expandText(idx) {
  document.getElementById("preview-" + idx).style.display = "none";
  document.getElementById("full-" + idx).style.display = "inline";
  document.getElementById("btn-" + idx).style.display = "none";
}
</script>

</body>
</html>
