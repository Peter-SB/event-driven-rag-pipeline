<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title }}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
    }

    header {
      background: #1a1a2e;
      color: #fff;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    header h1 { font-size: 1.25rem; font-weight: 600; letter-spacing: -0.02em; }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      color: #fff;
      text-decoration: none;
      font-size: 0.85rem;
      opacity: 0.8;
      transition: opacity 0.15s;
    }
    .back-link:hover { opacity: 1; }

    main { max-width: 800px; margin: 2rem auto; padding: 0 1.5rem; }

    .post-card {
      background: #fff;
      border-radius: 12px;
      padding: 1.75rem 2rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      border-left: 4px solid #6366f1;
    }

    .post-title {
      font-size: 1.4rem;
      font-weight: 700;
      color: #1a1a2e;
      line-height: 1.3;
      margin-bottom: 0.5rem;
    }

    .post-meta {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      font-size: 0.8rem;
      color: #999;
      margin-bottom: 1.25rem;
    }

    .post-meta a {
      color: #6366f1;
      text-decoration: none;
    }
    .post-meta a:hover { text-decoration: underline; }

    .post-summary {
      background: #f7f7fb;
      border-radius: 8px;
      padding: 1rem 1.25rem;
      font-size: 0.9rem;
      color: #444;
      font-style: italic;
      margin-bottom: 1.5rem;
    }

    .post-body {
      font-size: 0.95rem;
      line-height: 1.7;
      color: #333;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>

<header>
  <a href="/ui/search" class="back-link">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="15 18 9 12 15 6"/>
    </svg>
    Back
  </a>
  <h1>Post</h1>
</header>

<main>
  <div class="post-card">
    <div class="post-title">{{ title }}</div>
    <div class="post-meta">
      <span>Library: {{ library_id }}</span>
      <span>Post #{{ post_id }}</span>
      {% if created_at %}<span>Posted: {{ created_at }}</span>{% endif %}
      {% if url %}<a href="{{ url }}" target="_blank" rel="noopener noreferrer">Original link ↗</a>{% endif %}
    </div>

    {% if summary %}
    <div class="post-summary">{{ summary }}</div>
    {% endif %}

    {% if body_text %}
    <div class="post-body">{{ body_text }}</div>
    {% endif %}
  </div>
</main>

</body>
</html>
